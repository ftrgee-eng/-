<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>إضافة عقار | دار لينك</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <nav class="navbar container">
      <a class="brand" href="index.html"><span class="brand-mark">د</span><span>دار لينك</span></a>
      <div class="nav-links visible"><a href="index.html">الرئيسية</a></div>
    </nav>
  </header>

  <main class="section container narrow">
    <p class="eyebrow">نموذج مبدئي</p>
    <h1>إضافة عقار</h1>
    <p class="muted">بما أن GitHub Pages استضافة ثابتة، هذا النموذج لا يحفظ البيانات في قاعدة بيانات. استخدمه كنموذج عرض، أو اربطه لاحقاً بخدمة خارجية مثل Formspree / Google Forms.</p>
    <form class="form-card" action="mailto:info@example.com" method="post" enctype="text/plain">
      <label>اسم العقار<input name="title" required placeholder="مثال: شقة فاخرة في الياسمين" /></label>
      <label>المدينة<input name="city" required placeholder="الرياض" /></label>
      <label>الحي<input name="district" placeholder="النرجس" /></label>
      <label>السعر<input name="price" type="number" placeholder="1200000" /></label>
      <label>الوصف<textarea name="description" rows="5" placeholder="اكتب تفاصيل العقار"></textarea></label>
      <button class="btn" type="submit">إرسال الطلب</button>
    </form>
  </main>
</body>
</html>
